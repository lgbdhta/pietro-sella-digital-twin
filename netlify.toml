[build]
  command = "rm -rf node_modules package-lock.json && npm install && npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  included_files = [
    "dist-server/**",
    "node_modules/sql.js/dist/sql-wasm.wasm"
  ]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
